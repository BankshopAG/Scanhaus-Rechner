/* ============================================================================
   BERECHNUNGSLOGIK
   ============================================================================ */
function monatsrate(d, z, t) { if (d <= 0) return 0; return (d * (z + t) / 100) / 12; }
function darlehenAusRate(r, z, t) { if ((z + t) <= 0 || r <= 0) return 0; return (r * 12 * 100) / (z + t); }
function restschuldNachJahren(d, z, t, j) {
  if (d <= 0) return 0;
  const q = 1 + z / 100, a = d * (z + t) / 100, qn = Math.pow(q, j);
  if (q === 1) return Math.max(0, d - a * j);
  return Math.max(0, d * qn - a * (qn - 1) / (q - 1));
}
function tilgungsdauer(d, z, t) {
  if (d <= 0 || (z + t) <= 0) return 0;
  const q = 1 + z / 100, a = d * (z + t) / 100;
  if (q === 1) return d / a;
  const ratio = a / (a - d * (q - 1));
  if (ratio <= 0) return Infinity;
  return Math.log(ratio) / Math.log(q);
}
function immobilienwert(kp, w, j) { return kp * Math.pow(1 + w / 100, j); }

/**
 * Prüft Förderfähigkeit und ermittelt KfW 300 Förderdarlehen.
 *
 * Berücksichtigt:
 *  - mind. 1 Kind im Haushalt
 *  - klimafreundlicher Neubau (Pflicht)
 *  - Einkommensgrenze (90.000 € bei 1 Kind, +10.000 € je weiteres Kind)
 *  - QNG ja/nein → höherer Kreditbetrag
 *  - Förderprogramm im Config aktiviert
 *
 * Liefert { foerderfaehig: bool, grund?: string, darlehen?: {...} }
 */
function pruefeKfW300(k, opt) {
  if (!k.kfw300.aktiv) return { foerderfaehig: false, grund: 'Förderung deaktiviert' };
  if (!opt.foerdermittelAktiv) return { foerderfaehig: false, grund: 'Förderdarlehen abgewählt' };
  if (opt.bestehendesWohneigentum) return { foerderfaehig: false, grund: 'Bestehendes Wohneigentum schließt KfW 300 aus' };
  if (!opt.klimaNeubau) return { foerderfaehig: false, grund: 'Klimafreundlicher Neubau (Effizienzhaus 40) ist Voraussetzung' };
  if (opt.kinder < 1) return { foerderfaehig: false, grund: 'Mindestens 1 Kind unter 18 erforderlich' };

  // Staffelung holen — bei mehr als 5 Kindern wird die ab-5-Stufe verwendet
  const stufe = k.kfw300.staffelung[Math.min(opt.kinder, 5)];
  // Einkommensgrenze: ab 5 Kindern +10.000 € je weiterem Kind
  let einkommensgrenze = stufe.maxEinkommen;
  if (opt.kinder > 5) {
    einkommensgrenze += (opt.kinder - 5) * k.kfw300.einkommensgrenzeProWeiteremKind;
  }
  if (opt.zuVersteuerndesEinkommen > einkommensgrenze) {
    return {
      foerderfaehig: false,
      grund: `Haushaltseinkommen überschreitet die Grenze von ${new Intl.NumberFormat('de-DE', { maximumFractionDigits: 0 }).format(einkommensgrenze)} € (bei ${opt.kinder} Kind${opt.kinder !== 1 ? 'ern' : ''})`,
      einkommensgrenze,
    };
  }

  const maxBetrag = opt.qng ? stufe.qng : stufe.basis;
  return {
    foerderfaehig: true,
    einkommensgrenze,
    darlehen: {
      key: 'kfw_300',
      name: k.kfw300.name,
      maxBetrag,
      zins: k.kfw300.zins,
      qng: opt.qng,
    },
  };
}

/**
 * KfW 297/298 – Klimafreundlicher Neubau
 * Voraussetzungen: Effizienzhaus 40 oder 55 (befristet bis 30.06.2026).
 * Keine Einkommensgrenze, keine Familienbeschränkung, kein Verbot bei Voreigentum.
 * 297 = selbst genutzt, 298 = Ersterwerb — Konditionen identisch.
 */
function pruefeKfW297(k, opt) {
  if (!k.kfw297.aktiv) return { foerderfaehig: false, grund: 'Programm deaktiviert' };
  if (!opt.foerdermittelAktiv) return { foerderfaehig: false, grund: 'Förderdarlehen abgewählt' };
  if (!opt.klimaNeubau) return { foerderfaehig: false, grund: 'Klimafreundlicher Neubau (Effizienzhaus 40 oder 55) ist Voraussetzung' };

  const maxBetrag = opt.qng ? k.kfw297.maxEh40Qng : k.kfw297.maxEh40;
  return {
    foerderfaehig: true,
    darlehen: {
      key: 'kfw_297',
      name: k.kfw297.name,
      maxBetrag,
      zins: k.kfw297.zins,
      qng: opt.qng,
    },
  };
}

/**
 * Wählt automatisch die beste verfügbare KfW-Förderung.
 * Vorrang hat KfW 300 (höhere Beträge bei Familien), Fallback auf 297/298.
 * KfW 300 kann NICHT mit 297/298 kombiniert werden.
 */
function pruefeBesteKfWFoerderung(k, opt) {
  const r300 = pruefeKfW300(k, opt);
  if (r300.foerderfaehig) return { ...r300, gewaehltesProgramm: 'kfw_300', alternativeGeprueft: 'kfw_297' };

  const r297 = pruefeKfW297(k, opt);
  if (r297.foerderfaehig) {
    return {
      ...r297,
      gewaehltesProgramm: 'kfw_297',
      grund300: r300.grund, // Warum 300 nicht ging — für UI-Transparenz
      einkommensgrenze: r300.einkommensgrenze,
    };
  }
  // Nichts förderfähig
  return { foerderfaehig: false, grund: r297.grund || r300.grund, einkommensgrenze: r300.einkommensgrenze };
}

function mischzins(teile) {
  const s = teile.reduce((a, t) => a + (t.betrag || 0), 0);
  if (s <= 0) return 0;
  return teile.reduce((a, t) => a + (t.betrag || 0) * (t.zins || 0), 0) / s;
}

/**
 * Berechnet die monatliche Pauschale für Lebenshaltung nach Bank-Standard.
 * - 1. Person:      850 €
 * - 2. Person: +    400 € (Paar gesamt = 1.250 €)
 * - ab 3.:    +    400 € je weiterer Erwachsener
 * - + 300 € Hausunterhalt
 * - Kinder: 0 € (Kindergeld kompensiert Ausgaben)
 */
function haushaltspauschale(k, erwachsene) {
  const h = k.haushalt;
  if (erwachsene <= 0) return 0;
  let p = h.erwachsener_1;
  if (erwachsene >= 2) p += h.erwachsener_2;
  if (erwachsene >= 3) p += (erwachsene - 2) * h.erwachsener_weitere;
  p += h.hausunterhalt;
  return p;
}

/**
 * Tragfähige Monatsrate aus echter Haushaltsrechnung.
 * = Haushaltsnetto − Lebenshaltung − bestehende Kreditraten
 */
function tragfaehigeRate(k, eingaben) {
  const pauschale = haushaltspauschale(k, eingaben.erwachsene);
  return Math.max(0, eingaben.haushaltsnetto - pauschale - (eingaben.bestehendeKreditraten || 0));
}

function berechneFinanzierung(modus, eingaben, k) {
  const {
    haushaltsnetto = 0, zuVersteuerndesEinkommen = 0,
    eigenkapital = 0, maxRate = 0, hauspreis = 0,
    erwachsene = 2, bestehendeKreditraten = 0,
    nebenkostenQ = k.defaults.nebenkostenquote, tilgung = k.defaults.tilgung,
    zinsbindung = k.defaults.zinsbindung, wertentwicklung = k.defaults.wertentwicklung,
    foerdermittelAktiv = true, kinder = 0, klimaNeubau = false, qng = false,
    bankzinsOverride = null,
    kfwZinsOverride = null,
  } = eingaben;
  // Bankzins: manueller Wert hat Vorrang, sonst Default aus Konditionen
  const bankzins = (bankzinsOverride != null && bankzinsOverride > 0)
    ? bankzinsOverride
    : (k.bankzinsen[zinsbindung] ?? k.bankzinsen[10]);

  // Haushaltsrechnung
  const pauschale = haushaltspauschale(k, erwachsene);
  const tragRate = tragfaehigeRate(k, { haushaltsnetto, erwachsene, bestehendeKreditraten });

  // KfW: Beste verfügbare Förderung wählen (300 → wenn möglich, sonst 297/298)
  const kfwResult = pruefeBesteKfWFoerderung(k, { foerdermittelAktiv, kinder, klimaNeubau, qng, zuVersteuerndesEinkommen, bestehendesWohneigentum: eingaben.bestehendesWohneigentum });

  // KfW-Zins: manueller Wert hat Vorrang, sonst Default aus Konditionen
  if (kfwResult.foerderfaehig && kfwZinsOverride != null && kfwZinsOverride > 0) {
    kfwResult.darlehen = { ...kfwResult.darlehen, zins: kfwZinsOverride };
  }

  let budget = 0, benoetigtesNetto = 0, monatlicheRate = 0;
  let bankdarlehen = 0, gesamtdarlehen = 0;
  let foerderbetrag = 0;
  let kfwGenutzt = null;

  if (modus === 'budget') {
    // ===== MODUS 1: Was kann ich mir leisten? =====
    monatlicheRate = Math.min(maxRate > 0 ? maxRate : tragRate, tragRate);

    if (kfwResult.foerderfaehig) {
      foerderbetrag = kfwResult.darlehen.maxBetrag;
      const rateFoerder = monatsrate(foerderbetrag, kfwResult.darlehen.zins, tilgung);
      const verbleibendeRate = Math.max(0, monatlicheRate - rateFoerder);
      bankdarlehen = darlehenAusRate(verbleibendeRate, bankzins, tilgung);
      kfwGenutzt = { ...kfwResult.darlehen, betrag: foerderbetrag };
    } else {
      bankdarlehen = darlehenAusRate(monatlicheRate, bankzins, tilgung);
    }
    gesamtdarlehen = bankdarlehen + foerderbetrag;
    budget = (gesamtdarlehen + eigenkapital) / (1 + nebenkostenQ / 100);

  } else {
    // ===== MODUS 2: Passt dieses Haus zu mir? =====
    const gesamtkosten = hauspreis * (1 + nebenkostenQ / 100);
    const finanzierungsbedarf = Math.max(0, gesamtkosten - eigenkapital);

    if (kfwResult.foerderfaehig) {
      foerderbetrag = Math.min(kfwResult.darlehen.maxBetrag, finanzierungsbedarf);
      kfwGenutzt = { ...kfwResult.darlehen, betrag: foerderbetrag };
    }
    bankdarlehen = Math.max(0, finanzierungsbedarf - foerderbetrag);
    gesamtdarlehen = bankdarlehen + foerderbetrag;

    const rateBank = monatsrate(bankdarlehen, bankzins, tilgung);
    const rateFoerder = foerderbetrag > 0 ? monatsrate(foerderbetrag, k.kfw300.zins, tilgung) : 0;
    monatlicheRate = rateBank + rateFoerder;

    // Erforderliches Netto = Rate + Pauschale + bestehende Kreditraten
    benoetigtesNetto = monatlicheRate + pauschale + bestehendeKreditraten;
    budget = hauspreis;
  }

  // Mischzins
  const teile = [{ betrag: bankdarlehen, zins: bankzins }];
  if (foerderbetrag > 0) teile.push({ betrag: foerderbetrag, zins: k.kfw300.zins });
  const mZins = mischzins(teile);

  const restschuld10 = restschuldNachJahren(gesamtdarlehen, mZins, tilgung, 10);
  const restschuld20 = restschuldNachJahren(gesamtdarlehen, mZins, tilgung, 20);
  const laufzeitJahre = tilgungsdauer(gesamtdarlehen, mZins, tilgung);
  const wert10 = immobilienwert(budget, wertentwicklung, 10);
  const wert20 = immobilienwert(budget, wertentwicklung, 20);

  let foerdervorteil = 0;
  if (foerderbetrag > 0 && bankzins > 0 && kfwGenutzt) {
    foerdervorteil = (monatsrate(foerderbetrag, bankzins, tilgung) - monatsrate(foerderbetrag, kfwGenutzt.zins, tilgung)) * 12 * zinsbindung;
  }

  const eigenkapitalquote = budget > 0 ? (eigenkapital / budget) * 100 : 0;
  const finanzierungsquote = budget > 0 ? (gesamtdarlehen / budget) * 100 : 0;

  // Frei verfügbar nach Rate
  const freiNachRate = tragRate - monatlicheRate;

  // Ampel — auf Basis der echten Haushaltsrechnung
  let ampel = 'gruen', ampelText = 'Die Ersteinschätzung wirkt solide. Mit diesen Werten haben Sie eine gute Ausgangsbasis für die persönliche Prüfung.';
  if (modus === 'budget') {
    if (budget <= 0 || tragRate <= 0) { ampel = 'rot'; ampelText = 'Nach Abzug der typischen Haushaltskosten bleibt aktuell zu wenig Spielraum für eine Rate. Eine persönliche Prüfung kann hier Wege aufzeigen.'; }
    else if (eigenkapitalquote < 10) { ampel = 'gelb'; ampelText = 'Das Eigenkapital ist gering. Eine persönliche Prüfung mit unseren Bankenpartnern lohnt sich.'; }
    else if (eigenkapitalquote < 20) { ampel = 'gelb'; ampelText = 'Die Konstellation ist grundsätzlich machbar — sollte aber individuell geprüft werden.'; }
  } else {
    if (haushaltsnetto > 0 && freiNachRate < 0) { ampel = 'rot'; ampelText = 'Nach Lebenshaltung und bestehenden Krediten bleibt aktuell nicht genug Spielraum für die Rate. Eine persönliche Prüfung kann Wege aufzeigen.'; }
    else if (haushaltsnetto > 0 && freiNachRate < 200) { ampel = 'gelb'; ampelText = 'Die Rate ist tragbar, aber der monatliche Puffer ist knapp. Eine persönliche Prüfung schafft Klarheit.'; }
    else if (eigenkapitalquote < 10) { ampel = 'gelb'; ampelText = 'Das Eigenkapital ist gering. Eine persönliche Prüfung lohnt sich.'; }
  }

  return {
    modus, budget, benoetigtesNetto, monatlicheRate, bankdarlehen,
    foerderbetrag, kfwGenutzt, kfwResult, gesamtdarlehen, bankzins, mischzins: mZins,
    foerdervorteil, restschuld10, restschuld20, laufzeitJahre,
    wert10, wert20, nettovermoegen10: wert10 - restschuld10, nettovermoegen20: wert20 - restschuld20,
    eigenkapitalquote, finanzierungsquote, ampel, ampelText, eingaben,
    // Haushaltsrechnung — für transparente Anzeige
    haushalt: { pauschale, tragRate, freiNachRate, bestehendeKreditraten, erwachsene },
  };
}

/* ============================================================================
   FORMAT-HELPER
   ============================================================================ */
const fmtEUR = (n, f = 0) => {
  if (!isFinite(n) || isNaN(n)) return '– €';
  return new Intl.NumberFormat('de-DE', { style: 'currency', currency: 'EUR', maximumFractionDigits: f, minimumFractionDigits: f }).format(n);
};
const fmtPct = (n, f = 1) => {
  if (!isFinite(n) || isNaN(n)) return '– %';
  return new Intl.NumberFormat('de-DE', { maximumFractionDigits: f, minimumFractionDigits: f }).format(n) + ' %';
};
const fmtDate = (iso) => new Date(iso).toLocaleDateString('de-DE', { day: '2-digit', month: 'long', year: 'numeric' });

function AirbagModul({ rate }) {

              <div className="text-xs text-white/60 mt-0.5">Schutz bei Krankheit, Arbeitsunfähigkeit &amp; Arbeitslosigkeit — beim Bau Ihres ScanHauses geschenkt.</div>
            </div>
            <svg className={`w-6 h-6 text-white/70 transition-transform flex-shrink-0 ${offen ? 'rotate-180' : ''}`} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 12 15 18 9"/></svg>

                {[1, 2].map(n => (
                  <button key={n} onClick={() => setPersonen(n)} className={`px-5 py-2 rounded-lg text-sm font-bold transition ${personen === n ? 'bg-navy text-white shadow' : 'text-ink-500'}`}>{n === 1 ? '1 Person' : '2 Personen'}</button>

                    <div className="text-[11px] text-ink-400 mt-1">{b.sub}</div>
                  </div>
                ))}
              </div>
            </div>

            <div className="mt-4 text-[11px] text-ink-400 leading-relaxed">
              „Schutzvolumen" = maximal mögliche Leistungen über 10 Jahre, keine garantierte Auszahlung; Leistung nur nach Maßgabe der Versicherungsbedingungen. Wahrscheinlichkeit = konservative Modellrechnung (Quellen: DAV, RKI/ZfKD, Bundesagentur für Arbeit), kein Einzelfallnachweis. Produktgeber/Risikoträger: RheinLand Versicherungs AG (BaFin) über Partner Credit Life; ScanHaus Marlow ist kein Versicherungsvermittler.

function VerlaufsChart({ darlehen, mischzinsP, tilgungP, kaufpreis, wertentwicklungP }) {
  const data = useMemo(() => {
    const points = [];
    for (let j = 0; j <= 20; j += 2) {
      points.push({ jahr: j, rest: restschuldNachJahren(darlehen, mischzinsP, tilgungP, j), wert: immobilienwert(kaufpreis, wertentwicklungP, j) });
    }
    return points;
  }, [darlehen, mischzinsP, tilgungP, kaufpreis, wertentwicklungP]);
  const maxVal = Math.max(...data.map(d => Math.max(d.rest, d.wert)), 1);
  const W = 600, H = 220, P = 30;
  const xScale = (j) => P + (j / 20) * (W - 2 * P);
  const yScale = (v) => H - P - (v / maxVal) * (H - 2 * P);
  const pathRest = data.map((d, i) => `${i === 0 ? 'M' : 'L'} ${xScale(d.jahr)} ${yScale(d.rest)}`).join(' ');
  const pathWert = data.map((d, i) => `${i === 0 ? 'M' : 'L'} ${xScale(d.jahr)} ${yScale(d.wert)}`).join(' ');
  const areaWert = `${pathWert} L ${xScale(20)} ${H - P} L ${xScale(0)} ${H - P} Z`;
  return (
    <div className="bg-stone-50 rounded-2xl p-5 lg:p-6">
      <div className="flex flex-wrap items-baseline justify-between gap-3 mb-4">
        <div>
          <div className="font-display text-xl font-semibold text-navy">Vermögensaufbau über die Zeit</div>
          <div className="text-xs text-ink-500 mt-0.5">Angenommene Wertentwicklung {fmtPct(wertentwicklungP)} p.a. — keine Prognose</div>
        </div>
        <div className="flex gap-4 text-xs">
          <div className="flex items-center gap-1.5"><div className="w-3 h-3 rounded-full bg-gold" /><span className="text-ink-600">Immobilienwert</span></div>
          <div className="flex items-center gap-1.5"><div className="w-3 h-3 rounded-full bg-navy" /><span className="text-ink-600">Restschuld</span></div>
        </div>
      </div>
      <svg viewBox={`0 0 ${W} ${H}`} className="w-full h-auto" preserveAspectRatio="none">
        <defs>
          <linearGradient id="wertGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor="#d7c9a7" stopOpacity="0.4" />
            <stop offset="100%" stopColor="#d7c9a7" stopOpacity="0" />
          </linearGradient>
        </defs>
        {[0, 0.25, 0.5, 0.75, 1].map(t => (
          <line key={t} x1={P} y1={P + t * (H - 2 * P)} x2={W - P} y2={P + t * (H - 2 * P)} stroke="#e7e5e4" strokeWidth="1" strokeDasharray="2 4" />
        ))}
        <path d={areaWert} fill="url(#wertGrad)" />
        <path d={pathWert} fill="none" stroke="#c9a96e" strokeWidth="2.5" strokeLinecap="round" />
        <path d={pathRest} fill="none" stroke="#0b1d3a" strokeWidth="2.5" strokeLinecap="round" />
        {[0, 5, 10, 15, 20].map(j => (
          <text key={j} x={xScale(j)} y={H - 8} textAnchor="middle" fontSize="10" fill="#78716c">{j === 0 ? 'heute' : `+${j}J`}</text>
        ))}
      </svg>
    </div>
  );
}

/** Dedizierte KfW-300-Karte mit Status (förderfähig / nicht) */

    return (
      <div className="bg-gradient-to-br from-gold/10 to-gold/5 border border-gold/30 rounded-3xl p-6 lg:p-8">

            <div className="text-sm text-ink-500">zu {fmtPct(kfwGenutzt.zins, 2)} Sollzins</div>

        </div>

        {/* Bei KfW 297: Hinweis warum nicht 300 */}
        {!ist300 && kfwResult.grund300 && (
          <div className="mb-4 p-3 bg-white/60 border border-stone-200 rounded-xl text-xs text-ink-600">
            <strong className="text-navy">Hinweis:</strong> KfW 300 (höhere Förderbeträge bis 240 T€) ist hier nicht möglich — {kfwResult.grund300.toLowerCase()}.
            Stattdessen greift die Alternative KfW 297/298, die keine Einkommensgrenze und keine Beschränkung bei bestehendem Wohneigentum kennt.

        <div className="grid sm:grid-cols-3 gap-3 pt-4 border-t border-gold/20">
          <div>
            <div className="text-xs text-ink-500 mb-0.5">Max. Förderbetrag</div>
            <div className="font-semibold text-navy tabular-nums">{fmtEUR(kfwGenutzt.maxBetrag)}</div>
          </div>
          {ist300 && kfwResult.einkommensgrenze && (
            <div>
              <div className="text-xs text-ink-500 mb-0.5">Einkommensgrenze</div>
              <div className="font-semibold text-navy tabular-nums">{fmtEUR(kfwResult.einkommensgrenze)}</div>
            </div>
          )}
          {!ist300 && (
            <div>
              <div className="text-xs text-ink-500 mb-0.5">Einkommensgrenze</div>
              <div className="font-semibold text-navy">keine</div>
            </div>
          )}
          <div>
            <div className="text-xs text-ink-500 mb-0.5">Fördervorteil</div>
            <div className="font-semibold text-green-700 tabular-nums">{fmtEUR(result.foerdervorteil)}</div>
          </div>
        </div>
        <div className="text-xs text-ink-400 italic mt-4">
          Förderbetrag gemäß offizieller KfW-Konditionen — verbindliche Zusage erfolgt durch die KfW, vorbehaltlich finaler Prüfung.
        </div>
      </div>
    );
  }

  return (
    <div className="bg-stone-50 border border-stone-200 rounded-3xl p-6 lg:p-8">
      <div className="flex items-start gap-4">
        <div className="w-12 h-12 rounded-xl bg-stone-200 flex items-center justify-center flex-shrink-0">
          <svg className="w-6 h-6 text-stone-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        </div>
        <div className="flex-1">
          <div className="text-xs font-bold tracking-widest uppercase text-stone-500 mb-1">KfW-Förderung</div>
          <div className="font-display text-xl font-semibold text-navy mb-1">Aktuell keine KfW-Förderung möglich</div>

          <div className="text-xs text-ink-400 italic mt-3">
            Die KfW-Förderung erfordert mindestens einen klimafreundlichen Neubau (Effizienzhaus 40 oder 55). Trotzdem prüfen wir gerne, welche anderen Bausteine in Frage kommen.

function FinanzierungsNavigator() {
  // Vermittler-Daten + Zinsen: erst URL-Parameter prüfen, dann Config-Fallback
  const vermittler = useMemo(() => {
    const params = typeof window !== 'undefined' ? new URLSearchParams(window.location.search) : new URLSearchParams();
    const fromUrl = (key) => {
      const v = params.get(key);
      return v && v.trim() ? v.trim() : null;
    };
    return {
      hausbaufirma:       fromUrl('hf') || konditionen.vermittler.hausbaufirma,
      hausverkaeufer:     fromUrl('hv') || konditionen.vermittler.hausverkaeufer,
      hausverkaeuferTelefon: fromUrl('hvt') || null,
      hausverkaeuferEmail:   fromUrl('hve') || null,
      finanziererName:    fromUrl('fn') || konditionen.vermittler.finanziererName,
      finanziererTelefon: fromUrl('ft') || konditionen.vermittler.finanziererTelefon,
      cta_url:            fromUrl('u')  || konditionen.vermittler.cta_url,
    };
  }, []);

  // Aktive Konditionen: wenn Zins-Parameter in URL → diese nutzen, sonst Standard
  // Konditionen werden aus zinsen.json (zentrale Datei) geladen
  // Optional: Sonder-Konditionen aus URL überschreiben für einzelnen Link
  const [geladeneKonditionen, setGeladeneKonditionen] = useState(null);

  useEffect(() => {
    // zinsen.json laden (liegt im selben Ordner wie diese HTML)
    fetch('zinsen.json?t=' + Date.now())
      .then(r => r.ok ? r.json() : null)
      .then(data => {
        if (data && data.bankzinsen) {
          setGeladeneKonditionen(data);
        }
      })
      .catch(() => {
        // Falls zinsen.json fehlt: Standard aus konditionen wird genutzt
      });
  }, []);

  const aktiveKonditionen = useMemo(() => {
    // 1) Basis: hartkodierte Defaults aus konditionen
    let aktiv = { ...konditionen };

    // 2) Falls zinsen.json geladen: deren Werte verwenden
    if (geladeneKonditionen && geladeneKonditionen.bankzinsen) {
      aktiv = {
        ...aktiv,
        stand: geladeneKonditionen.stand || aktiv.stand,
        bankzinsen: { ...aktiv.bankzinsen, ...geladeneKonditionen.bankzinsen },
      };
    }
    // KfW-Zinsen aus zinsen.json übernehmen (falls vorhanden)
    if (geladeneKonditionen && geladeneKonditionen.kfw) {
      if (geladeneKonditionen.kfw.kfw300 != null) {
        aktiv = { ...aktiv, kfw300: { ...aktiv.kfw300, zins: geladeneKonditionen.kfw.kfw300 } };
      }
      if (geladeneKonditionen.kfw.kfw297 != null) {
        aktiv = { ...aktiv, kfw297: { ...aktiv.kfw297, zins: geladeneKonditionen.kfw.kfw297 } };
      }
    }

    // 3) Sonder-Konditionen aus URL prüfen (z.B. für Sonderaktionen)
    if (typeof window === 'undefined') return aktiv;
    const params = new URLSearchParams(window.location.search);
    const fromUrl = (key) => {
      const v = parseFloat(params.get(key));
      return isFinite(v) && v > 0 ? v : null;
    };
    const z5 = fromUrl('z5'), z10 = fromUrl('z10'), z15 = fromUrl('z15');
    const z20 = fromUrl('z20'), z30 = fromUrl('z30');
    const zd = params.get('zd');

    if (z5 == null && z10 == null && z15 == null && z20 == null && z30 == null && !zd) {
      return aktiv;
    }
    return {
      ...aktiv,
      stand: zd || aktiv.stand,
      bankzinsen: {
        5:  z5  != null ? z5  : aktiv.bankzinsen[5],
        10: z10 != null ? z10 : aktiv.bankzinsen[10],
        15: z15 != null ? z15 : aktiv.bankzinsen[15],
        20: z20 != null ? z20 : aktiv.bankzinsen[20],
        30: z30 != null ? z30 : aktiv.bankzinsen[30],
      },
      // Markierung dass das Sonder-Konditionen sind
      sonderkonditionen: true,
    };
  }, [geladeneKonditionen]);

  const [modus, setModus] = useState('budget');
  const [haushaltsnetto, setHaushaltsnetto] = useState(4500);
  const [zuVersteuerndesEinkommen, setZuVersteuerndesEinkommen] = useState(80000);
  const [eigenkapital, setEigenkapital] = useState(80000);
  const [maxRate, setMaxRate] = useState(1400);
  const [hauspreis, setHauspreis] = useState(450000);
  const [erwachsene, setErwachsene] = useState(2);
  const [bestehendeKreditraten, setBestehendeKreditraten] = useState(0);
  const [nebenkostenQ, setNebenkostenQ] = useState(konditionen.defaults.nebenkostenquote);
  const [tilgung, setTilgung] = useState(konditionen.defaults.tilgung);
  const [zinsbindung, setZinsbindung] = useState(konditionen.defaults.zinsbindung);
  const [wertentwicklung, setWertentwicklung] = useState(konditionen.defaults.wertentwicklung);
  const [foerdermittelAktiv, setFoerdermittelAktiv] = useState(true);
  const [kinder, setKinder] = useState(2);
  const [klimaNeubau, setKlimaNeubau] = useState(true);
  const [qng, setQng] = useState(false);
  const [bestehendesWohneigentum, setBestehendesWohneigentum] = useState(false);

  // ===== PDF-Vorschlag-Modal =====
  const [pdfModalOffen, setPdfModalOffen] = useState(false);
  const [pdfKaeufer, setPdfKaeufer] = useState('');
  const [pdfObjektAdresse, setPdfObjektAdresse] = useState('');
  const [pdfBaujahr, setPdfBaujahr] = useState('');
  const [pdfWohnflaeche, setPdfWohnflaeche] = useState('');
  const [pdfNotizen, setPdfNotizen] = useState('');
  const [bankzinsManuell, setBankzinsManuell] = useState(false);
  const [bankzinsOverride, setBankzinsOverride] = useState(konditionen.bankzinsen[10]);
  // KfW-Zins manuell überschreiben
  const [kfwZinsManuell, setKfwZinsManuell] = useState(false);
  const [kfwZinsOverride, setKfwZinsOverride] = useState(konditionen.kfw300.zins);

  const result = useMemo(() => berechneFinanzierung(modus, {
    haushaltsnetto, zuVersteuerndesEinkommen, eigenkapital, maxRate, hauspreis,
    erwachsene, bestehendeKreditraten,
    nebenkostenQ, tilgung, zinsbindung, wertentwicklung,
    // Bei bestehendem Wohneigentum: KfW 300 ist nicht förderfähig
    foerdermittelAktiv,
    bestehendesWohneigentum,  // gibt direkt durch — wird in pruefeKfW300 ausgewertet
    kinder, klimaNeubau, qng,
    bankzinsOverride: bankzinsManuell ? bankzinsOverride : null,
    kfwZinsOverride: kfwZinsManuell ? kfwZinsOverride : null,
  }, aktiveKonditionen), [modus, haushaltsnetto, zuVersteuerndesEinkommen, eigenkapital, maxRate, hauspreis, erwachsene, bestehendeKreditraten, nebenkostenQ, tilgung, zinsbindung, wertentwicklung, foerdermittelAktiv, kinder, klimaNeubau, qng, bestehendesWohneigentum, bankzinsManuell, bankzinsOverride, kfwZinsManuell, kfwZinsOverride, aktiveKonditionen]);

  // Aktuelle Einkommensgrenze für UI-Hinweis berechnen
  const einkommensgrenzeAktuell = useMemo(() => {
    if (kinder < 1) return null;
    const stufe = konditionen.kfw300.staffelung[Math.min(kinder, 5)];
    let g = stufe.maxEinkommen;
    if (kinder > 5) g += (kinder - 5) * konditionen.kfw300.einkommensgrenzeProWeiteremKind;
    return g;
  }, [kinder]);

  return (
    <>
    <div className="min-h-screen bg-cream font-sans text-ink-800 no-print">
      {/* ============ NAVI-BAR mit Wortmarke ============ */}
      <nav className="sticky top-0 z-50 bg-white/85 backdrop-blur-md border-b border-stone-200/70">
        <div className="max-w-6xl mx-auto px-5 lg:px-8 h-20 flex items-center justify-between">
          {/* Wortmarke — CEB klein, Bankshop groß, AG klein + Zusatz darunter */}
          <a href="/" className="group">
            <div className="flex items-baseline gap-1">
              <span className="font-sans text-2xl lg:text-3xl font-extrabold tracking-tight text-navy leading-none">SCAN<span className="text-gold">HAUS</span></span>
            </div>
            <div className="text-[10px] lg:text-[11px] font-semibold tracking-[0.18em] uppercase text-ink-400 mt-1">
              Erst bauen – dann zahlen
            </div>
          </a>
          {/* Rechts in der Navi: nur Claim oder leer (Hausverkäufer-Info kommt separat) */}
          {!(vermittler.hausbaufirma || vermittler.hausverkaeufer) && (
            <div className="hidden md:block text-xs font-medium tracking-widest uppercase text-ink-400">
              {konditionen.anbieter.claim}
            </div>
          )}
        </div>
      </nav>

      {/* ============ HAUSVERKÄUFER-LEISTE — prominent, mobile + desktop ============ */}
      {(vermittler.hausbaufirma || vermittler.hausverkaeufer) && (
        <div className="bg-gradient-to-r from-navy via-navy-2 to-navy text-white border-b border-navy">
          <div className="max-w-6xl mx-auto px-5 lg:px-8 py-3 lg:py-4">
            <div className="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-2 sm:gap-4">

            label={result.kfwGenutzt?.key === 'kfw_297' ? 'KfW 297/298' : 'KfW 300'}
            value={result.foerderbetrag > 0 ? fmtEUR(result.foerderbetrag) : '—'}
            sub={result.foerderbetrag > 0 ? `zu ${fmtPct(result.kfwGenutzt.zins, 2)} Sollzins` : 'aktuell nicht möglich'}
            accent="accent" />
          <StatCard label="Eigenkapitalquote" value={fmtPct(result.eigenkapitalquote)} sub={`Finanzierung: ${fmtPct(result.finanzierungsquote)}`} accent="success" />
          <StatCard label="Geschätzte Laufzeit" value={`${isFinite(result.laufzeitJahre) ? result.laufzeitJahre.toFixed(1) : '–'} J.`} sub="bis zur Volltilgung" />
        </div>

        {/* Haushaltsrechnung — Transparenz für Nutzer */}
        <div className="mb-8">
          <HaushaltsCard result={result} />
        </div>

        {/* KfW 300 Card */}
        <div className="mb-8">
          <KfW300Card result={result} />
        </div>

        {/* Visuelle Finanzierungsstruktur */}
        <div className="bg-white border border-stone-200 rounded-3xl p-6 lg:p-8 mb-8">
          <div className="mb-5">
            <div className="font-display text-xl font-semibold text-navy">Wie sich Ihre Finanzierung zusammensetzt</div>
            <div className="text-sm text-ink-500 mt-0.5">Gesamtbedarf: {fmtEUR(result.gesamtdarlehen + (result.eingaben.eigenkapital || 0))}</div>
          </div>
          <FinanzierungsBar
            eigenkapital={result.eingaben.eigenkapital || 0}
            bankdarlehen={result.bankdarlehen}
            foerderbetrag={result.foerderbetrag}
            gesamtbedarf={result.gesamtdarlehen + (result.eingaben.eigenkapital || 0)} />
        </div>

        <VerlaufsChart darlehen={result.gesamtdarlehen} mischzinsP={result.mischzins} tilgungP={tilgung} kaufpreis={result.budget} wertentwicklungP={wertentwicklung} />

        <div className="mt-8 grid md:grid-cols-2 gap-4">
          <div className="bg-white border border-stone-200 rounded-3xl p-6 lg:p-7">
            <div className="text-xs font-bold tracking-widest uppercase text-stone-500 mb-4">In 10 Jahren</div>
            <div className="space-y-3">
              <div className="flex justify-between items-baseline"><span className="text-sm text-ink-600">Immobilienwert</span><span className="font-display text-xl font-semibold text-navy tabular-nums">{fmtEUR(result.wert10)}</span></div>
              <div className="flex justify-between items-baseline"><span className="text-sm text-ink-600">Restschuld</span><span className="font-display text-xl font-semibold text-rose-700 tabular-nums">−{fmtEUR(result.restschuld10)}</span></div>
              <div className="flex justify-between items-baseline pt-3 border-t border-stone-200"><span className="text-sm font-semibold text-navy">Rechn. Nettovermögen</span><span className="font-display text-2xl font-semibold text-green-700 tabular-nums">{fmtEUR(result.nettovermoegen10)}</span></div>
            </div>
          </div>
          <div className="bg-white border border-stone-200 rounded-3xl p-6 lg:p-7">
            <div className="text-xs font-bold tracking-widest uppercase text-stone-500 mb-4">In 20 Jahren</div>
            <div className="space-y-3">
              <div className="flex justify-between items-baseline"><span className="text-sm text-ink-600">Immobilienwert</span><span className="font-display text-xl font-semibold text-navy tabular-nums">{fmtEUR(result.wert20)}</span></div>
              <div className="flex justify-between items-baseline"><span className="text-sm text-ink-600">Restschuld</span><span className="font-display text-xl font-semibold text-rose-700 tabular-nums">−{fmtEUR(result.restschuld20)}</span></div>
              <div className="flex justify-between items-baseline pt-3 border-t border-stone-200"><span className="text-sm font-semibold text-navy">Rechn. Nettovermögen</span><span className="font-display text-2xl font-semibold text-green-700 tabular-nums">{fmtEUR(result.nettovermoegen20)}</span></div>
            </div>
          </div>
        </div>

        {/* PDF-Vorschlag-Button */}
        <div className="mt-8 no-print">
          <div className="bg-gradient-to-br from-stone-50 to-cream border border-stone-200 rounded-3xl p-6 lg:p-8">
            <div className="flex flex-col md:flex-row md:items-center md:justify-between gap-5">
              <div className="flex items-start gap-4 flex-1">
                <div className="w-12 h-12 rounded-2xl bg-gold/15 flex items-center justify-center flex-shrink-0">
                  <svg className="w-6 h-6 text-gold-dark" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                    <polyline points="14 2 14 8 20 8"/>
                    <line x1="9" y1="15" x2="15" y2="15"/>
                    <line x1="9" y1="18" x2="15" y2="18"/>
                  </svg>
                </div>
                <div className="flex-1">
                  <div className="font-display text-xl font-semibold text-navy mb-1">Finanzierungsvorschlag als PDF</div>
                  <div className="text-sm text-ink-600 leading-relaxed">
                    Erstellen Sie ein professionelles Übergabe-Dokument mit allen Eckdaten Ihres Bauvorhabens — ideal für die Übergabe an Bauherren oder Banken.
                  </div>
                </div>
              </div>
              <button
                onClick={() => setPdfModalOffen(true)}
                className="flex-shrink-0 inline-flex items-center justify-center gap-2 px-6 py-3.5 text-sm font-semibold text-white bg-navy hover:bg-navy-2 rounded-2xl transition-all shadow-md hover:shadow-lg whitespace-nowrap"
              >
                <svg className="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                  <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                  <polyline points="7 10 12 15 17 10"/>
                  <line x1="12" y1="15" x2="12" y2="3"/>
                </svg>
                Vorschlag erstellen
              </button>
            </div>
          </div>
        </div>

        <div className="mt-8"><AmpelBox state={result.ampel} text={result.ampelText} /></div>
      </Section>

      {/* CTA */}
      <section className="px-5 lg:px-8 pb-16 lg:pb-24">
        <div className="max-w-6xl mx-auto">
          <div className="relative overflow-hidden rounded-3xl bg-gradient-to-br from-navy via-navy-2 to-navy text-white p-8 lg:p-14 text-center shadow-2xl">
            <div className="absolute -top-32 -right-32 w-96 h-96 rounded-full bg-gold/15 blur-3xl" />
            <div className="absolute -bottom-32 -left-32 w-96 h-96 rounded-full bg-green-500/10 blur-3xl" />
            <div className="relative max-w-2xl mx-auto">
              <div className="text-xs font-semibold tracking-widest uppercase text-gold mb-3">Ihr nächster Schritt</div>
              <h2 className="font-display text-3xl md:text-4xl lg:text-5xl font-medium tracking-tight leading-tight mb-4">
                In <em className="italic text-gold">48 Stunden</em> zur passenden Finanzierung.
              </h2>
              <p className="text-white/70 text-lg leading-relaxed mb-8 max-w-xl mx-auto">{konditionen.ui.cta.hinweis}</p>

              {/* Finanzierer-Block — erscheint nur wenn eingetragen */}
              {vermittler.finanziererName && (
                <div className="mb-8 inline-block bg-white/[0.06] backdrop-blur-sm border border-white/15 rounded-2xl px-6 py-4 text-left">
                  <div className="text-[10px] font-semibold tracking-widest uppercase text-gold mb-1">Ihr persönlicher Finanzierer</div>
                  <div className="font-semibold text-white text-base">{vermittler.finanziererName}</div>
                  {vermittler.finanziererTelefon && (
                    <a href={`tel:${vermittler.finanziererTelefon.replace(/[^\d+]/g, '')}`}
                      className="inline-flex items-center gap-1.5 text-sm text-white/80 hover:text-white transition-colors mt-1">
                      <svg className="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
                      {vermittler.finanziererTelefon}
                    </a>
                  )}
                </div>
              )}

              <a href={vermittler.cta_url || konditionen.ui.cta.url}
                className="inline-flex items-center gap-3 px-8 lg:px-10 py-5 bg-white text-navy font-bold text-base lg:text-lg rounded-full hover:scale-[1.02] hover:shadow-2xl hover:shadow-gold/30 transition-all">
                {konditionen.ui.cta.label}
                <svg className="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
              </a>
              <div className="mt-6 flex flex-wrap justify-center gap-x-6 gap-y-2 text-sm text-white/60">
                <div className="flex items-center gap-1.5"><svg className="w-4 h-4 text-gold" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><path d="M20 6 9 17l-5-5"/></svg>Über 750 Banken im Vergleich</div>
                <div className="flex items-center gap-1.5"><svg className="w-4 h-4 text-gold" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><path d="M20 6 9 17l-5-5"/></svg>Ihre Hausbank auf Wunsch dabei</div>
                <div className="flex items-center gap-1.5"><svg className="w-4 h-4 text-gold" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><path d="M20 6 9 17l-5-5"/></svg>Antwort in 48 Stunden</div>
                <div className="flex items-center gap-1.5"><svg className="w-4 h-4 text-gold" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><path d="M20 6 9 17l-5-5"/></svg>Kostenfrei &amp; unverbindlich</div>
              </div>
            </div>
          </div>
        </div>
      </section>

      {/* FOOTER */}
      <footer className="border-t border-stone-200 bg-white">
        <div className="max-w-6xl mx-auto px-5 lg:px-8 py-12">
          {/* Footer-Hauptbereich: 3 Spalten */}
          <div className="grid md:grid-cols-3 gap-8 lg:gap-12 mb-10">
            {/* Spalte 1: Wortmarke + Kurztext */}
            <div>
              <div className="mb-3">
                <div className="flex items-baseline gap-1.5">
                  <span className="text-xs font-semibold tracking-[0.2em] uppercase text-ink-500">CEB</span>
                  <span className="font-display text-2xl font-semibold tracking-tight text-navy leading-none">Bankshop</span>
                  <span className="text-xs font-medium tracking-widest uppercase text-ink-500">AG</span>
                </div>
                <div className="text-[10px] font-medium tracking-wider uppercase text-ink-400 mt-1">
                  Vermittlung von Bankdienstleistungen
                </div>
              </div>
              <p className="text-sm text-ink-500 leading-relaxed mb-3">
                Ihr unabhängiger Partner für Baufinanzierung mit Zugang zu über 750 Banken.
              </p>
              <p className="text-xs text-ink-400 leading-relaxed">
                Hauptverwaltung Leipzig — Über 285.000 Kunden seit 2006.
              </p>
            </div>

            {/* Spalte 2: Kontakt */}
            <div>
              <div className="text-xs font-bold tracking-widest uppercase text-stone-500 mb-3">Kontakt</div>
              <div className="space-y-1.5 text-sm text-ink-600">
                <div>{konditionen.anbieter.adresse.strasse}</div>
                <div>{konditionen.anbieter.adresse.plzOrt}</div>
                <div className="pt-2">Tel. {konditionen.anbieter.telefon}</div>
                <div>Fax {konditionen.anbieter.telefax}</div>
                <a href={`mailto:${konditionen.anbieter.email}`} className="block text-navy hover:underline">{konditionen.anbieter.email}</a>
              </div>
            </div>

            {/* Spalte 3: Pflichtangaben & Links */}
            <div>
              <div className="text-xs font-bold tracking-widest uppercase text-stone-500 mb-3">Unternehmen</div>
              <div className="space-y-1.5 text-sm text-ink-600">
                <div><span className="text-ink-400">Vorstand:</span> {konditionen.anbieter.vorstand}</div>
                <div><span className="text-ink-400">Aufsichtsrat:</span> {konditionen.anbieter.aufsichtsrat}</div>
                <div className="text-xs text-ink-500 pt-1">{konditionen.anbieter.handelsregister}</div>
                <div className="text-xs text-ink-500">Steuer-Nr.: {konditionen.anbieter.steuerNr}</div>
                <div className="pt-3 flex gap-4">
                  <a href={konditionen.anbieter.impressumUrl} target="_blank" rel="noopener noreferrer" className="text-ink-600 hover:text-navy transition-colors">Impressum</a>
                  <a href={konditionen.anbieter.datenschutzUrl} target="_blank" rel="noopener noreferrer" className="text-ink-600 hover:text-navy transition-colors">Datenschutz</a>
                </div>
              </div>
            </div>
          </div>

          {/* § 34i GewO — Pflichtangabe für Immobiliardarlehensvermittler */}
          <div className="pt-8 border-t border-stone-200 mb-6">
            <div className="text-xs font-bold tracking-widest uppercase text-stone-500 mb-2">Erlaubnis &amp; Registrierung</div>
            <p className="text-xs text-ink-500 leading-relaxed">
              <strong className="text-ink-700">Statusinformation nach § 34i GewO:</strong> {konditionen.anbieter.erlaubnisHinweis}.
              Registrierungsnummer <strong className="text-ink-700">{konditionen.anbieter.registrierungsnummer}</strong>.
              Zuständige Erlaubnisbehörde: {konditionen.anbieter.erlaubnisbehoerde}. Zuständige Registerbehörde: {konditionen.anbieter.registerbehoerde}.
              Außergerichtliche Streitbeilegung: {konditionen.anbieter.schlichtungsstelle}.
            </p>
          </div>

          {/* Disclaimer + Copyright */}
          <div className="pt-6 border-t border-stone-200 space-y-3">
            <p className="text-xs text-ink-400 leading-relaxed">
              <strong className="text-ink-600">Wichtiger Hinweis:</strong> Diese Berechnung ist eine unverbindliche Ersteinschätzung und ersetzt keine individuelle Finanzierungsprüfung. Förderbeträge, Zinssätze und Konditionen können sich täglich ändern. Die angenommene Wertentwicklung ist keine Prognose, sondern eine reine Modellannahme. Eine konkrete Förderzusage für die KfW 300 erfolgt ausschließlich durch die KfW, vorbehaltlich finaler Prüfung.
            </p>
            <div className="flex flex-wrap items-baseline justify-between gap-2 text-xs text-ink-400">
              <span>Berechnung auf Basis der Konditionen vom <strong className="text-ink-600">{fmtDate(aktiveKonditionen.stand)}</strong>.</span>
              <span>© {new Date().getFullYear()} {konditionen.anbieter.name} – {konditionen.anbieter.nameZusatz}. Alle Rechte vorbehalten.</span>
            </div>
          </div>
        </div>
      </footer>

      {/* PDF-Modal */}
      <PdfModalEingabe
        offen={pdfModalOffen}
        onClose={() => setPdfModalOffen(false)}
        daten={{ kaeufer: pdfKaeufer, objektAdresse: pdfObjektAdresse, baujahr: pdfBaujahr, wohnflaeche: pdfWohnflaeche, notizen: pdfNotizen }}
        setDaten={(d) => { setPdfKaeufer(d.kaeufer); setPdfObjektAdresse(d.objektAdresse); setPdfBaujahr(d.baujahr); setPdfWohnflaeche(d.wohnflaeche); setPdfNotizen(d.notizen); }}
        onErstellen={() => { setPdfModalOffen(false); setTimeout(() => window.print(), 250); }}
      />
    </div>

    {/* Druckansicht für PDF — außerhalb der no-print-Hülle, damit sie beim Drucken sichtbar bleibt */}
    <PdfPrintView
      result={result}
      eingaben={{
        hauspreis, eigenkapital, nebenkostenQ, tilgung, zinsbindung,
        haushaltsnetto, wertentwicklungP: wertentwicklung,
      }}
      kundenDaten={{ kaeufer: pdfKaeufer, objektAdresse: pdfObjektAdresse, baujahr: pdfBaujahr, wohnflaeche: pdfWohnflaeche, notizen: pdfNotizen }}
      vermittler={{
        hf: vermittler.hausbaufirma,
        hv: vermittler.hausverkaeufer,
        t: vermittler.hausverkaeuferTelefon,
        email: vermittler.hausverkaeuferEmail,
        fn: vermittler.finanziererName,
        ft: vermittler.finanziererTelefon,
      }}
      konditionen={aktiveKonditionen}
      datum={aktiveKonditionen.stand}
    />
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<FinanzierungsNavigator />);
</script>
</body>
</html>
